spring.application.name=trackit

server.port=8081

# CORS: optional extra allowed origins (comma-separated exact URLs), in addition to localhost / 127.0.0.1 (any port).
# app.cors.allowed-origins=https://app.example.com

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/TrackIt?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:trackit}
spring.datasource.password=${DB_PASSWORD:TrackIt}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.sql.init.mode=never
spring.flyway.enabled=true
# DB already had tables but no Flyway history (e.g. pre-Flyway setup): baseline once, then only migrations above baseline run.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# JWT (HS256): secret must be >= 256 bits when UTF-8 encoded — override in production via env.
app.jwt.secret=${JWT_SECRET:TrackIt-JWT-256-bit-secret-key-CHANGE-ME-in-production!!!!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# AES key (Base64-decoded to 16/24/32 bytes) for secrets vault data-at-rest encryption.
# REQUIRED: inject via env/secret manager. Example:
# export SECRET_ENCRYPTION_KEY_BASE64=$(openssl rand -base64 32)
app.secret.encryption-key-base64=${SECRET_ENCRYPTION_KEY_BASE64:}
# Optional metadata only (no direct vault client in app). Useful for ops docs:
# app.secret.vault-key-ref=kv/data/trackit/secret-encryption-key

# Background jobs (Spring @Scheduled). Cron uses Spring 6-field format: sec min hour day month weekday.
app.scheduler.recurring-enabled=true
app.scheduler.recurring-cron=0 0 1 * * *
app.scheduler.reminders-enabled=true
app.scheduler.reminder-cron=0 * * * * *

# OpenAPI (springdoc): Swagger UI at /swagger-ui.html, JSON at /v3/api-docs
