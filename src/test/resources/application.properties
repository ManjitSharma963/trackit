spring.datasource.url=jdbc:h2:mem:trackit_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.sql.init.mode=never
spring.flyway.enabled=true

app.jwt.secret=TrackIt-JWT-256-bit-secret-key-CHANGE-ME-in-production!!!!
app.jwt.expiration-ms=86400000

app.scheduler.recurring-enabled=false
app.scheduler.reminders-enabled=false
